<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>MyNote</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyNote">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="codemirror/codemirror.min.css">
<link rel="stylesheet" href="codemirror/theme/material-darker.min.css">

<script src="codemirror/codemirror.min.js"></script>
<script src="codemirror/mode/xml/xml.min.js"></script>
<script src="codemirror/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="codemirror/addon/edit/closetag.min.js"></script>
<script src="codemirror/addon/edit/closebrackets.min.js"></script>
<style>
body {
  font-family: -apple-system, system-ui, sans-serif;
  margin: 0;
  padding: 16px;
  background: #111;
  color: #fff;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  outline: none;
}
textarea { height: 18vh; }

button {
  padding: 8px 12px;
  margin: 4px 4px 4px 0;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}
button.clear {
  background:#444;
  color:white;
}
.primary { background: #0a84ff; color: white; }
.stop { background: #ff453a; color: white; }
.tag {
  background:#333;
  padding:3px 6px;
  border-radius:6px;
  margin-right:4px;
  cursor:pointer;
}
.note-item {
  background:#222;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
}
.note-title {
  font-weight:bold;
}
small { opacity:0.6; }
.filter-bar {
  margin-bottom:10px;
}
.toolbar {
  margin-bottom:8px;
}
.toolbar button {
  margin:2px;
  padding:6px 8px;
}
.editor {
  min-height: 150px;
  padding: 20px;
  border-radius: 10px;
  background: #fefefe;
  outline: none;
  color:#111;
  line-height: 1.5;
}

.editor.html-mode {
  font-family: monospace;
  white-space: pre-wrap;
  overflow-wrap: break-word;
}

.html-tag { color: #ff9f0a; }
.html-attr { color: #5ac8fa; }
.html-string { color: #32d74b; }
.html-comment { color: #8e8e93; }

.editor p {
  margin: 0 0 10px 0;   /* отступ между абзацами */
  color:#111;
}

.editor ul,
.editor ol {
  margin: 8px 0 8px 0;
}
.editor img {
  max-width:100%;
  border-radius:8px;
  margin:6px 0;
}
.editor {
  white-space: pre-wrap;
}
</style>
</head>
<body>

<h2>MyNote</h2>

<input id="title" placeholder="Заголовок" />
<div class="toolbar">
  Редактор: 
  <button onclick="format('bold')"><b>B</b></button>
  <button onclick="format('italic')"><i>I</i></button>
  <button onclick="format('underline')"><u>U</u></button>

  <button onclick="format('insertUnorderedList')">• List</button>
  <button onclick="format('insertOrderedList')">1. List</button>

  <button onclick="setHeading('h1')">H1</button>
  <button onclick="setHeading('h2')">H2</button>

  <button onclick="format('justifyLeft')">⬅</button>
  <button onclick="format('justifyCenter')">⬌</button>
  <button onclick="format('justifyRight')">➡</button>

  <button onclick="openColorPicker()">🎨</button>
<input type="color" id="colorPicker" style="display:none" onchange="setColor(this.value)">

  <button onclick="addImage()">📷</button>
  <button onclick="toggleHTML()">HTML</button>
  <button onclick="cleanHTML()">Clean HTML</button>
</div>

<div id="content" contenteditable="true" class="editor"></div>

<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="insertImage(event)"></br>
<input id="tags" placeholder="Теги через запятую (пример: идея, работа)" />

<div>
  Управление:
  <button class="primary" onclick="saveNote()">Сохранить</button>
  <button class="clear" onclick="clearForm()">Очистить</button>
  <button onclick="startDictation()">🎤</button>
  <button class="primary" onclick="speakCurrent()">Озвучить</button>
  <button class="stop" onclick="stopSpeech()">Стоп</button>
<button onclick="exportNotes()">Экспорт</button>
<button onclick="document.getElementById('importFile').click()">Импорт</button>
<input type="file" id="importFile" accept="application/json" style="display:none" onchange="importNotes(event)">
</div>

<hr>

<div class="filter-bar">
  <span id="filterInfo"></span>
 Фильтрация по тегам: <button onclick="clearFilter()">Сбросить фильтр</button>
</div>

<div id="notesList"></div>

<script>
let db;
let editingId = null;
let currentTagFilter = null;
let isHTMLMode = false;
let codeMirrorInstance = null;
document.addEventListener("DOMContentLoaded", () => {
  document.execCommand("defaultParagraphSeparator", false, "p");
});

function formatHTML(html) {

  const blockTags = ['ul', 'ol']; // только они увеличивают уровень
  const selfClosing = ['img', 'br', 'hr'];

  let formatted = '';
  let indent = 0;

  html = html.replace(/>\s+</g, '><');

  const nodes = html.split(/></);

  nodes.forEach((node, index) => {

    if (index !== 0) node = '<' + node;
    if (index !== nodes.length - 1) node = node + '>';

    const tagMatch = node.match(/^<\/?(\w+)/);
    const tag = tagMatch ? tagMatch[1].toLowerCase() : null;

    const isClosing = /^<\/\w/.test(node);
    const isOpening = /^<\w/.test(node) && !isClosing;
    const isSelfClosingTag = selfClosing.includes(tag);

    if (isClosing && blockTags.includes(tag)) {
      indent = Math.max(indent - 1, 0);
    }

    formatted += '  '.repeat(indent) + node + '\n';

    if (isOpening && blockTags.includes(tag) && !isSelfClosingTag) {
      indent++;
    }
  });

  return formatted.trim();
}

function normalizeHTML(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");
  return doc.body.innerHTML.trim();
}

function toggleHTML() {

  const editor = document.getElementById("content");

  if (!isHTMLMode) {

    const normalized = normalizeHTML(editor.innerHTML);

    // создаём textarea временно
    const textarea = document.createElement("textarea");
    textarea.value = normalized;
    editor.innerHTML = "";
    editor.appendChild(textarea);

    codeMirrorInstance = CodeMirror.fromTextArea(textarea, {
      mode: "htmlmixed",
      theme: "material-darker",
      lineNumbers: true,
      lineWrapping: true,
      autoCloseTags: true,
      autoCloseBrackets: true
    });

    isHTMLMode = true;

  } else {

    const newHTML = codeMirrorInstance.getValue();

    codeMirrorInstance.toTextArea();
    codeMirrorInstance = null;

    editor.innerHTML = normalizeHTML(newHTML);

    isHTMLMode = false;
  }
}

function cleanHTML() {
  if (isHTMLMode && codeMirrorInstance) {
    const cleaned = normalizeHTML(codeMirrorInstance.getValue());
    codeMirrorInstance.setValue(cleaned);
  }
}

// ---------------- IndexedDB ----------------
// indexedDB.deleteDatabase("MyNoteDB");
const request = indexedDB.open("MyNoteDB", 1);

request.onupgradeneeded = function(e) {
  db = e.target.result;
  db.createObjectStore("notes", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = function(e) {
  db = e.target.result;
  loadNotes();
};

// ---------------- CRUD ----------------

function saveNote() {

  const titleInput = document.getElementById("title");
  const editor = document.getElementById("content");
  const tagsInputEl = document.getElementById("tags");

  const title = titleInput.value.trim();
  const rawHTML = editor.innerHTML;
  const textContent = editor.innerText.trim();
  const tagsInput = tagsInputEl.value.trim();

  // проверяем пустоту корректно
  if (!title && !textContent) return;

  const tags = tagsInput
    ? tagsInput.split(",").map(t => t.trim().toLowerCase()).filter(t => t)
    : [];

  const tx = db.transaction("notes", "readwrite");
  const store = tx.objectStore("notes");

  const noteData = {
    title: title || "(Без заголовка)",
    content: rawHTML,
    tags: tags,
    updated: new Date().toISOString()
  };

  if (editingId) {
    noteData.id = editingId;
    store.put(noteData);
  } else {
    noteData.created = new Date().toISOString();
    store.add(noteData);
  }

  tx.oncomplete = () => {
    clearForm();
    loadNotes();
  };
}
function stripHTML(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || "";
}

function loadNotes() {
  const list = document.getElementById("notesList");
  list.innerHTML = "";

  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.getAll();

  request.onsuccess = () => {

    let notes = request.result.reverse();

    if (currentTagFilter) {
      notes = notes.filter(n =>
        (n.tags || []).includes(currentTagFilter)
      );
    }

    document.getElementById("filterInfo").innerText =
      currentTagFilter ? "Фильтр: #" + currentTagFilter : "";

    notes.forEach(note => {

      const div = document.createElement("div");
      div.className = "note-item";

      div.innerHTML = `
        <div class="note-title">${note.title}</div>
        <div>${stripHTML(note.content || "").substring(0,120)}</div>
        <small>${new Date(note.updated).toLocaleString()}</small>
        <div>
          Теги(нажатие фильтрует по тегу):
          ${(note.tags || []).map(tag =>
            `<span class="tag" onclick="filterByTag('${tag}')">#${tag}</span>`
          ).join("")}
        </div>
        <button onclick="editNote(${note.id})">Редактировать</button>
        <button onclick="readNote(${note.id})">▶</button>
        <button onclick="deleteNote(${note.id})">Удалить</button>
      `;

      list.appendChild(div);
    });
  };
}

function editNote(id) {
  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.get(id);

  request.onsuccess = () => {
    const note = request.result;

    document.getElementById("title").value = note.title;
    document.getElementById("content").innerHTML = note.content;
    document.getElementById("tags").value =
      (note.tags || []).join(", ");

    editingId = note.id;
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
}

function deleteNote(id) {
  const tx = db.transaction("notes", "readwrite");
  const store = tx.objectStore("notes");
  store.delete(id);
  tx.oncomplete = loadNotes;
}

function clearForm() {
  console.log("CLEAR FORM CALLED");
  document.getElementById("title").value = "";
  const editor = document.getElementById("content");
  editor.innerHTML = "<p><br></p>";
  document.getElementById("tags").value = "";
  editingId = null;
  editor.focus();
}

// ---------------- Tags ----------------

function filterByTag(tag) {
  currentTagFilter = tag;
  loadNotes();
}

function clearFilter() {
  currentTagFilter = null;
  loadNotes();
}


// ---------------- Speech (TTS) ----------------

function speakCurrent() {
  const text = document.getElementById("content").value;
  speakText(text);
}

function readNote(id) {
  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.get(id);

  request.onsuccess = () => {
    speakText(request.result.content);
  };
}

function detectLanguage(text) {
  const ukrainianPattern = /[іїєґІЇЄҐ]/;
  return ukrainianPattern.test(text) ? "uk-UA" : "ru-RU";
}

function speakText(text) {
  if (!text) return;

  const lang = detectLanguage(text);

  const utterance = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  const selectedVoice = voices.find(v =>
    v.lang === lang || v.lang.startsWith(lang.split("-")[0])
  );

  if (selectedVoice) {
    utterance.voice = selectedVoice;
  } else {
    utterance.lang = lang;
  }

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}
function stopSpeech() {
  speechSynthesis.cancel();
}
// ---------------- Voice Input (iPhone) ----------------

let recognition = null;
let isListening = false;

function startDictation() {

  if (!('webkitSpeechRecognition' in window)) {
    alert("Голосовой ввод не поддерживается");
    return;
  }

  if (isListening) return;

  recognition = new webkitSpeechRecognition();
  recognition.lang = "ru-RU";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    const field = document.getElementById("content");
    field.value += (field.value ? " " : "") + text;
  };

  recognition.onend = () => {
    isListening = false;
    recognition = null;
  };

  recognition.start();
}

// ---------------- EXPORT ----------------

function exportNotes() {
  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.getAll();

  request.onsuccess = () => {
    const data = JSON.stringify(request.result, null, 2);

    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "mynote-backup.json";
    a.click();

    URL.revokeObjectURL(url);
  };
}

// ---------------- IMPORT (MERGE) ----------------

function importNotes(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      const importedNotes = JSON.parse(e.target.result);

      const tx = db.transaction("notes", "readwrite");
      const store = tx.objectStore("notes");

      const getAllReq = store.getAll();

      getAllReq.onsuccess = () => {
        const existing = getAllReq.result;

        importedNotes.forEach(note => {

          const duplicate = existing.find(n =>
            n.created === note.created &&
            n.title === note.title &&
            n.content === note.content
          );

          if (!duplicate) {
            delete note.id; // чтобы IndexedDB создала новый id
            store.add(note);
          }
        });

        tx.oncomplete = () => {
          loadNotes();
          alert("Импорт завершён");
        };
      };

    } catch (err) {
      alert("Ошибка чтения файла");
    }
  };

  reader.readAsText(file);
}

function format(command) {
  document.execCommand(command, false, null);
}

function setHeading(tag) {
  document.execCommand('formatBlock', false, tag);
}

function setColor(color) {

  const selection = window.getSelection();

  if (!selection.rangeCount) return;

  const range = selection.getRangeAt(0);

  if (range.collapsed) return; // если нет выделения

  const span = document.createElement("span");
  span.style.color = color;

  range.surroundContents(span);

  selection.removeAllRanges();
}

function addImage() {
  document.getElementById("imgInput").click();
}

function insertImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    document.execCommand("insertImage", false, e.target.result);
  };
  reader.readAsDataURL(file);
}
function openColorPicker() {
  document.getElementById("colorPicker").click();
}
// ---------------- Service Worker ----------------

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
