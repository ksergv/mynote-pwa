<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>MyNote</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyNote">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<style>
body {
  font-family: -apple-system, system-ui, sans-serif;
  margin: 0;
  padding: 16px;
  background: #111;
  color: #fff;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  outline: none;
}
textarea { height: 18vh; }

button {
  padding: 8px 12px;
  margin: 4px 4px 4px 0;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}
.primary { background: #0a84ff; color: white; }
.stop { background: #ff453a; color: white; }
.tag {
  background:#333;
  padding:3px 6px;
  border-radius:6px;
  margin-right:4px;
  cursor:pointer;
}
.note-item {
  background:#222;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
}
.note-title {
  font-weight:bold;
}
small { opacity:0.6; }
.filter-bar {
  margin-bottom:10px;
}
</style>
</head>
<body>

<h2>MyNote</h2>

<input id="title" placeholder="Заголовок" />
<textarea id="content" placeholder="Текст заметки..."
  autocapitalize="sentences"
  autocomplete="on"
  autocorrect="on"
  spellcheck="true"></textarea>
<input id="tags" placeholder="Теги через запятую (пример: идея, работа)" />

<div>
  <button class="primary" onclick="saveNote()">Сохранить</button>
  <button onclick="startDictation()">🎤</button>
  <button class="primary" onclick="speakCurrent()">Озвучить</button>
  <button class="stop" onclick="stopSpeech()">Стоп</button>
</div>

<hr>

<div class="filter-bar">
  <span id="filterInfo"></span>
  <button onclick="clearFilter()">Сбросить фильтр</button>
</div>

<div id="notesList"></div>

<script>
let db;
let editingId = null;
let currentTagFilter = null;

// ---------------- IndexedDB ----------------
// indexedDB.deleteDatabase("MyNoteDB");
const request = indexedDB.open("MyNoteDB", 1);

request.onupgradeneeded = function(e) {
  db = e.target.result;
  db.createObjectStore("notes", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = function(e) {
  db = e.target.result;
  loadNotes();
};

// ---------------- CRUD ----------------

function saveNote() {

  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const tagsInput = document.getElementById("tags").value.trim();

  const tags = tagsInput
    ? tagsInput.split(",").map(t => t.trim().toLowerCase()).filter(t => t)
    : [];

  if (!title && !content) return;

  const tx = db.transaction("notes", "readwrite");
  const store = tx.objectStore("notes");

  const noteData = {
    title: title || "(Без заголовка)",
    content: content || "",
    tags: tags,
    updated: new Date().toISOString()
  };

  if (editingId) {
    noteData.id = editingId;
    store.put(noteData);
  } else {
    noteData.created = new Date().toISOString();
    store.add(noteData);
  }

  tx.oncomplete = () => {
    clearForm();
    loadNotes();
  };
}

function loadNotes() {
  const list = document.getElementById("notesList");
  list.innerHTML = "";

  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.getAll();

  request.onsuccess = () => {

    let notes = request.result.reverse();

    if (currentTagFilter) {
      notes = notes.filter(n =>
        (n.tags || []).includes(currentTagFilter)
      );
    }

    document.getElementById("filterInfo").innerText =
      currentTagFilter ? "Фильтр: #" + currentTagFilter : "";

    notes.forEach(note => {

      const div = document.createElement("div");
      div.className = "note-item";

      div.innerHTML = `
        <div class="note-title">${note.title}</div>
        <div>${(note.content || "").substring(0,120)}</div>
        <small>${new Date(note.updated).toLocaleString()}</small>
        <div>
          ${(note.tags || []).map(tag =>
            `<span class="tag" onclick="filterByTag('${tag}')">#${tag}</span>`
          ).join("")}
        </div>
        <button onclick="editNote(${note.id})">Редактировать</button>
        <button onclick="readNote(${note.id})">▶</button>
        <button onclick="deleteNote(${note.id})">Удалить</button>
      `;

      list.appendChild(div);
    });
  };
}

function editNote(id) {
  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.get(id);

  request.onsuccess = () => {
    const note = request.result;

    document.getElementById("title").value = note.title;
    document.getElementById("content").value = note.content;
    document.getElementById("tags").value =
      (note.tags || []).join(", ");

    editingId = note.id;
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
}

function deleteNote(id) {
  const tx = db.transaction("notes", "readwrite");
  const store = tx.objectStore("notes");
  store.delete(id);
  tx.oncomplete = loadNotes;
}

function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  document.getElementById("tags").value = "";
  editingId = null;
}

// ---------------- Tags ----------------

function filterByTag(tag) {
  currentTagFilter = tag;
  loadNotes();
}

function clearFilter() {
  currentTagFilter = null;
  loadNotes();
}

// ---------------- Speech (TTS) ----------------

function speakCurrent() {
  const text = document.getElementById("content").value;
  speakText(text);
}

function readNote(id) {
  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.get(id);

  request.onsuccess = () => {
    speakText(request.result.content);
  };
}

function speakText(text) {
  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "ru-RU";
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function stopSpeech() {
  speechSynthesis.cancel();
}

// ---------------- Voice Input (iPhone) ----------------

let recognition = null;
let isListening = false;

function startDictation() {

  if (!('webkitSpeechRecognition' in window)) {
    alert("Голосовой ввод не поддерживается");
    return;
  }

  if (isListening) return;

  recognition = new webkitSpeechRecognition();
  recognition.lang = "ru-RU";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    const field = document.getElementById("content");
    field.value += (field.value ? " " : "") + text;
  };

  recognition.onend = () => {
    isListening = false;
    recognition = null;
  };

  recognition.start();
}

// ---------------- Service Worker ----------------

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
