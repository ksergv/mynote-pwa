<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyNote">
<title>MyNote</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<style>
body {
  font-family: -apple-system, system-ui, sans-serif;
  margin: 0;
  padding: 16px;
  background: #111;
  color: #fff;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  outline: none;
}
textarea { height: 20vh; }

button {
  padding: 8px 12px;
  margin: 4px 4px 4px 0;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}
.primary { background: #0a84ff; color: white; }
.stop { background: #ff453a; color: white; }

.note-item {
  background: #222;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
}
.note-title {
  font-weight: bold;
  margin-bottom: 4px;
}
small { opacity: 0.6; }
</style>
</head>
<body>

<h2>MyNote</h2>

<input id="title" placeholder="Заголовок" />
<textarea id="content" placeholder="Текст заметки..."></textarea>

<div>
  <button class="primary" onclick="saveNote()">Сохранить</button>
  <button onclick="pasteFromClipboard()">Вставить</button>
  <button class="primary" onclick="speakCurrent()">Озвучить</button>
  <button onclick="startDictation()" id="micBtn">🎤</button>
  <button class="stop" onclick="stop()">Стоп</button>
</div>

<hr>
<div id="notesList"></div>

<script>
//indexedDB.deleteDatabase("MyNoteDB");
// ---------------- DB ----------------

let db;
let editingId = null;

const request = indexedDB.open("MyNoteDB", 1);

request.onupgradeneeded = function(e) {
  db = e.target.result;
  db.createObjectStore("notes", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = function(e) {
  db = e.target.result;
  loadNotes();
};

// ---------------- CRUD ----------------

function saveNote() {
if (isListening) {
  alert("Сначала завершите диктовку");
  return;
}
  if (!db) {
    alert("База данных ещё не инициализирована");
    return;
  }

  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();

  if (!title && !content) return;

  const tx = db.transaction("notes", "readwrite");
  const store = tx.objectStore("notes");

  const noteData = {
    title: title || "(Без заголовка)",
    content: content || "",
    updated: new Date().toISOString()
  };

  if (editingId) {
    noteData.id = editingId;
    store.put(noteData);
  } else {
    noteData.created = new Date().toISOString();
    store.add(noteData);
  }

  tx.oncomplete = () => {
    clearForm();
    loadNotes();
  };

  tx.onerror = (e) => {
    console.error("Ошибка транзакции:", e);
  };
}

function loadNotes() {
  const list = document.getElementById("notesList");
  list.innerHTML = "";

  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.getAll();

  request.onsuccess = () => {
    request.result.reverse().forEach(note => {
      const div = document.createElement("div");
      div.className = "note-item";
      div.innerHTML = `
        <div class="note-title">${note.title || "(Без заголовка)"}</div>
        <div>${(note.content || "").substring(0,120)}</div>
        <small>${new Date(note.updated).toLocaleString()}</small><br>
        <button onclick="editNote(${note.id})">Редактировать</button>
        <button onclick="readNote(${note.id})">▶</button>
        <button onclick="deleteNote(${note.id})">Удалить</button>
      `;
      list.appendChild(div);
    });
  };
}

function editNote(id) {
  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.get(id);

  request.onsuccess = () => {
    const note = request.result;
    document.getElementById("title").value = note.title;
    document.getElementById("content").value = note.content;
    editingId = note.id;
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
}

function deleteNote(id) {
  const tx = db.transaction("notes", "readwrite");
  const store = tx.objectStore("notes");
  store.delete(id);
  tx.oncomplete = loadNotes;
}

function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  editingId = null;
}

// ---------------- Clipboard ----------------

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("content").value += text;
  } catch {
    alert("Нет доступа к буферу обмена");
  }
}

// ---------------- Speech ----------------

function speakCurrent() {
  const text = document.getElementById("content").value;
  speakText(text);
}

function readNote(id) {
  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  const request = store.get(id);

  request.onsuccess = () => {
    speakText(request.result.content);
  };
}

function speakText(text) {
  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "ru-RU";
  utterance.rate = 1;

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function stop() {
  speechSynthesis.cancel();
}
//------------------------speache recognition---
let recognition = null;
let isListening = false;

function startDictation() {

  if (!('webkitSpeechRecognition' in window)) {
    alert("Голосовой ввод не поддерживается на этом устройстве");
    return;
  }

  if (isListening) return;

  // создаём НОВЫЙ экземпляр каждый раз
  recognition = new webkitSpeechRecognition();

  recognition.lang = "ru-RU";
  recognition.continuous = false;      // важно для iOS
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    console.log("🎤 Слушаю...");
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    const field = document.getElementById("content");
    field.value += (field.value ? " " : "") + text;
  };

  recognition.onerror = (event) => {
    console.log("Ошибка:", event.error);
  };

  recognition.onend = () => {
    console.log("⏹ Остановлено");
    isListening = false;
    recognition = null;   // ключевой момент
  };

  recognition.start();
}
// ---------------- SW ----------------

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>
</body>
</html>
